<div class="bg">
    <canvas #bgCanvas class="bg__animation"></canvas>
    <div class="bg__overlay"></div>
</div>

<main class="content">
    <section class="card">
        <header class="card__header">
            <img class="card__badge" src="luigi-culon.png" alt="" loading="lazy" />
            <h1>hello world</h1>
        </header>

        <div class="search" aria-label="Buscar en Google">
            <svg class="search__icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                    d="M11 4a7 7 0 0 1 5.478 11.269l4.126 4.127a1 1 0 0 1-1.414 1.414l-4.127-4.126A7 7 0 1 1 11 4zm0 2a5 5 0 1 0 3.535 8.536A5 5 0 0 0 11 6z" />
            </svg>
            <input class="search__field" type="text" placeholder="search search search search search search search" (keydown.enter)="search(searchBox.value)"
                #searchBox autofocus />
            <button type="button" class="search__action" (click)="search(searchBox.value)">search</button>
        </div>

        <div class="chips" aria-label="Accesos rápidos">
            <a class="chip" href="https://github.com/lgarbayo" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>GITHUB</span>
            </a>
            <a class="chip" href="https://calendar.google.com" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>CALENDAR</span>
            </a>
            <a class="chip" href="https://gemini.google.com/app" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>AI</span>
            </a>
            <a class="chip" href="https://mail.google.com" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>GMAIL</span>
            </a>
            <a class="chip" href="https://www.linkedin.com/in/luis-garbayo/" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>LINKEDIN</span>
            </a>
            <a class="chip" href="https://web.whatsapp.com" target="_blank" rel="noopener">
                <img src="luigi-culon.png" alt="" loading="lazy" />
                <span>WHATSAPP</span>
            </a>
        </div>

        <footer class="card__footer">
            <span>tip</span>
            <p>press <kbd>Ctrl</kbd> + <kbd>L</kbd> to jump to the address bar search</p>
        </footer>
    </section>
    <img class="hero-banner" src="lateral.png" alt="" aria-hidden="true" loading="lazy" />
</main>
